services:
  mysql:
    image: mysql:latest
    container_name: ball-log-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}  # 루트 비밀번호 설정
      MYSQL_DATABASE: ${MYSQL_DATABASE}            # 생성할 기본 데이터베이스 이름
      MYSQL_USER: ${MYSQL_USER}                    # 사용자 이름
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}            # 사용자 비밀번호
    ports:
      - "3306:3306"                       # 로컬 호스트의 3306 포트를 컨테이너의 3306 포트에 매핑
    volumes:
      - mysql_data:/var/lib/mysql         # 데이터 영속성을 위한 볼륨 마운트
    networks:
      - app-network

  ball-log:
    build:
      context: ./                         # Dockerfile이 위치한 디렉토리 경로
      dockerfile: Dockerfile                # 빌드에 사용할 Dockerfile의 이름
    container_name: ball-log-api
    ports:
      - "8080:8080"                       # 로컬 호스트의 8080 포트를 컨테이너의 8080 포트에 매핑
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      - mysql                             # mysql 서비스가 시작된 후 실행
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
